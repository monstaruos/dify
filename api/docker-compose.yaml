version: '3'

networks:
  default:
    external: true
    name: dify-middleware

services:
  api:
    image: dify-python-nonroot-${USERID:?set this like USERID=$$(id -u)}
    build:
      context: .
      dockerfile: Dockerfile-dev
      args:
        - userid=${USERID}
    volumes:
      - .:/home/developer/app
    ports:
      - "5001:5001"
    working_dir: /home/developer/app
    command: bash -l -c "_venv/bin/flask run --host 0.0.0.0 --port=5001 --debug"
